- name: configure catalougue
  hosts: catalougue
  become: yes
  tasks:
    - name: enable nodejs
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: installing nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Add system user
      ansible.builtin.user:
        name: roboshop
        comment: "roboshop system user"
        system: true
        home: /app
        shell: /sbin/nologin

    - name: Create a directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Download catalougue code
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: unzip catalougue code
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: install npm & dependencies
      community.general.npm:
        path: /app

    - name: copu catalougue service file
      ansible.builtin.copy:
        src: catalouge.yaml
        dest: /etc/systemd/system/catalogue.service

    - name: copu mongo repo
      ansible.builtin.copy:
        src: mongo.service
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongo client
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: check catalougue loaded or not
      ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")')
      register: catalougue_output

    - name: print the  output
      ansible.builtin.debug:
        msg: "{{ catalougue_output }}"
      
    - name: load the products
      ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
      when: catalougue_output.stdout < 0
