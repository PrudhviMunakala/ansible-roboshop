- name: create an ec2 instance
  hosts: all
  connection: local
  vars:
    sg_id: "sg-0932cabd95603ae65"
    ami_id: "ami-0220d79f3f480ecf5"
    env: "dev"
    instances:
      - mongodb
      - catalougue
  tasks:
    - name: creating multiple instances
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        name: "{{ item }}-{{ env }}"
        tags:
          project: roboshop
          environment: "{{ env }}"
          componenet: "{{ item }} "
          name: "{{ item }}-{{ env }}"
      loop: "{{ instances }}"
      register: ec2_output
    - name: print the output
      ansible.buitln.debug:
        msg: "{{ ec2_output }}"
